# Worktree configuration
[worktree]
base = "origin/main"
# on_create = "cargo build"  # Command to run after worktree creation
# copy = [".env"]            # Gitignored files to copy to new worktrees

# Spawn configuration
[spawn]
auto = true
auto_spawn = true
max_concurrent_workers = 3
auto_spawn_interval = 30

# Agent configuration
[agent]
type = "claude"
