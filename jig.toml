# Worktree configuration
[worktree]
base = "origin/main"
# on_create = "cargo build"  # Command to run after worktree creation
# copy = [".env"]            # Gitignored files to copy to new worktrees

# Spawn configuration
[spawn]
auto = true
autoSpawn = true
maxConcurrentWorkers = 3
autoSpawnInterval = 30

# Agent configuration
[agent]
type = "claude"
