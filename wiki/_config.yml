title: jig
tagline: Multiply yourself across parallel agent sessions
description: Git worktree manager for orchestrating agentic coding assistants in parallel.
baseurl: ""
url: https://jig.krondor.org

markdown: kramdown
highlighter: rouge

collections:
  docs:
    output: true
    permalink: /docs/:slug/
  articles:
    output: true
    permalink: /articles/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: docs
    values:
      layout: doc
  - scope:
      path: ""
      type: articles
    values:
      layout: article
  - scope:
      path: "index.md"
    values:
      layout: home
  - scope:
      path: "articles.md"
    values:
      layout: articles

exclude:
  - Gemfile
  - Gemfile.lock
  - Makefile

brand:
  primary_color: "#fabd2f"
  accent_color: "#fe8019"
  tagline: "Multiply yourself."
